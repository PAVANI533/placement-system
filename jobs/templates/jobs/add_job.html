{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e293b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .full {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #6366f1;
            box-shadow: 0 0 6px rgba(99,102,241,0.3);
            outline: none;
        }

        textarea {
            min-height: 100px;
        }

        .section-title {
            margin: 25px 0 10px;
            font-size: 16px;
            font-weight: bold;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💼 Add New Job</h2>

    <form method="post">
        {% csrf_token %}

        <!-- BASIC INFO -->
        <div class="section-title">Basic Details</div>

        <div class="grid">
            <div>
                <label>Job Title</label>
                <input type="text" name="title" required>
            </div>

            <div>
                <label>Company</label>
                <input type="text" name="company" required>
            </div>

            <div>
                <label>Location</label>
                <input type="text" name="location" required>
            </div>

            <div>
                <label>HR Name</label>
                <input type="text" name="hr_name">
            </div>

            <div>
                <label>Package (CTC)</label>
                <input type="text" name="package" placeholder="e.g. 6 LPA">
            </div>

            <div>
                <label>Interview Date</label>
                <input type="date" name="interview_date">
            </div>
        </div>

        <!-- JOB DETAILS -->
        <div class="section-title">Job Details</div>

        <div class="grid">
            <div class="full">
                <label>Description</label>
                <textarea name="description" required></textarea>
            </div>

            <div class="full">
                <label>Required Skills</label>
                <input type="text" name="required_skills" placeholder="Python, SQL, Django">
            </div>

            <div class="full">
                <label>Company Careers URL</label>
                <input type="url" name="company_url">
            </div>
        </div>

        <button type="submit">🚀 Post Job</button>
    </form>
</div>

</body>
</html>
