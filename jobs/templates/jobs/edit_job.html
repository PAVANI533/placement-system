{% extends 'base.html' %}
{% block content %}

<style>
.container {
    max-width: 600px;
    margin: 40px auto;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.card h2 {
    text-align: center;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #334155;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
}

textarea {
    resize: none;
    height: 100px;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.btn:hover {
    background: #1d4ed8;
}
</style>

<div class="container">
    <div class="card">

        <h2>✏️ Edit Job</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" name="title" value="{{ job.title }}">
            </div>

            <div class="form-group">
                <label>Company</label>
                <input type="text" name="company" value="{{ job.company }}">
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" value="{{ job.location }}">
            </div>

            <div class="form-group">
                <label>Package (LPA)</label>
                <input type="number" name="package" value="{{ job.package }}">
            </div>

            <div class="form-group">
                <label>HR Name</label>
                <input type="text" name="hr_name" value="{{ job.hr_name }}">
            </div>

            <div class="form-group">
                <label>Interview Date</label>
                <input type="date" name="interview_date" value="{{ job.interview_date|date:'Y-m-d' }}">
            </div>

            <div class="form-group">
                <label>Skills (comma separated)</label>
                <input type="text" name="skills" value="{{ job.required_skills }}">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description">{{ job.description }}</textarea>
            </div>

            <button type="submit" class="btn">Update Job</button>

        </form>

    </div>
</div>

{% endblock %}
